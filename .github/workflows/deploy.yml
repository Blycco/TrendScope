name: CD — Blue-Green Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # --- [1] Docker 이미지 빌드 & 레지스트리 push ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/trendscope/api:${{ github.sha }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/trendscope/frontend:${{ github.sha }}

      # --- [2] SSH → deploy.sh 실행 ---
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/trendscope
            API_IMAGE_TAG=${{ github.sha }} \
            DOMAIN=${{ secrets.DOMAIN }} \
            bash scripts/deploy.sh

      # --- [3] 외부 smoke test ---
      - name: Smoke test
        run: |
          curl -sf --max-time 15 "https://${{ secrets.DOMAIN }}/health" || exit 1

      # --- [4] 실패 시 GitHub Issue 댓글 알림 ---
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-failure',
              state: 'open',
            });
            const title = `Deploy failed: ${context.sha.slice(0, 7)} (${new Date().toISOString()})`;
            const body = [
              `## 배포 실패 알림`,
              `- **Commit**: ${context.sha}`,
              `- **Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- **Branch**: ${context.ref}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['deploy-failure'],
            });
