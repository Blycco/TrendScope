services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: trendscope/api:latest
    container_name: trendscope-api
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=development
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trendscope-net

  processor:
    build:
      context: .
      dockerfile: backend/Dockerfile.processor
    image: trendscope/processor:latest
    container_name: trendscope-processor
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=development
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trendscope-net
    profiles:
      - workers

  crawler:
    build:
      context: .
      dockerfile: backend/Dockerfile.crawler
    image: trendscope/crawler:latest
    container_name: trendscope-crawler
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=development
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trendscope-net
    profiles:
      - workers

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: trendscope/frontend:latest
    container_name: trendscope-frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    networks:
      - trendscope-net
    profiles:
      - frontend

  nginx:
    image: nginx:1.25-alpine
    container_name: trendscope-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - trendscope-net

  postgres:
    image: postgres:15-alpine
    container_name: trendscope-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trendscope-net

  redis:
    image: redis:7-alpine
    container_name: trendscope-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - trendscope-net

  prometheus:
    image: prom/prometheus:latest
    container_name: trendscope-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - trendscope-net
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: trendscope-grafana
    restart: unless-stopped
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - trendscope-net
    profiles:
      - monitoring

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  trendscope-net:
    driver: bridge
