user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;

    # --- Rate limiting ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

    server {
        listen 80;
        server_name _;

        # Docker DNS resolver for dynamic upstream resolution
        resolver 127.0.0.11 valid=10s;
        set $api_backend http://api:8000;

        # Redirect to HTTPS in production (comment out for local dev)
        # return 301 https://$host$request_uri;

        location /health {
            proxy_pass $api_backend;
            access_log off;
        }

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /admin/ {
            # --- IP whitelist (enable in production) ---
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;

            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location / {
            resolver 127.0.0.11 valid=30s;
            set $frontend http://frontend:3000;
            proxy_pass $frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- HTTPS server (SSL-ready, enable in production) ---
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location /api/ {
    #         limit_req zone=api_limit burst=50 nodelay;
    #         proxy_pass $api_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     location / {
    #         resolver 127.0.0.11 valid=30s;
    #         set $frontend http://frontend:3000;
    #         proxy_pass $frontend;
    #         proxy_set_header Host $host;
